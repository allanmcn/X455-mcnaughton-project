<body>

    <a class="w3-bar-item w3-button w3-padding-large w3-hide-medium w3-hide-large w3-right" href="javascript:void(0)" onclick="myFunction()" title="Toggle Navigation Menu"><img src="img/menu_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png"></i></a>
         <img src="img/dandy_boy_logo_wht.png" width="75px" style=float:left>

<!-- Navbar on small screens (remove the onclick attribute if you want the navbar to always show on top of the content when clicking on the links) -->
<div id="navDemo" class="w3-bar-block w3-black w3-hide w3-hide-large w3-hide-medium w3-top" style="margin-top:46px">
  <a href="#artists" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">artists</a>
  <a href="#tour" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">tour dates</a>
  <a href="#contact" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">contact</a>
  <a href="#releases" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">releases</a>
  <a href="#about" class="w3-bar-item w3-button w3-padding-large" onclick="myFunction()">about</a>
</div>

<!-- Page content -->

      <img
        class="w3-image"
        src="img/dandy_boy_26_roster.jpeg"
        alt="Dandy Boy Records"
        width="1600"
        height="800"
      />
  


<script>
// Used to toggle the menu on small screens when clicking on the menu button
function myFunction() {
  var x = document.getElementById("navDemo");
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}

// When the user clicks anywhere outside of the modal, close it
var modal = document.getElementById('ticketModal');
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
